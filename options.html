<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WebAnalyzer · Settings</title>
  <link rel="stylesheet" href="design-system.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background:
        radial-gradient(circle at 20% 10%, rgba(240, 168, 48, 0.10), transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(76, 196, 212, 0.10), transparent 45%),
        linear-gradient(160deg, #0d1117 0%, #131a24 50%, #0a0e14 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      font-family: var(--font-sans);
      font-size: var(--fs-base);
      padding: var(--sp-6);
      max-width: 560px;
      margin: 0 auto;
    }
    h1 {
      font-family: var(--font-mono);
      font-size: var(--fs-xl);
      margin-bottom: var(--sp-2);
    }
    h1 .bracket { color: var(--accent); }
    .sub {
      color: var(--text-secondary);
      margin-bottom: var(--sp-6);
      font-size: var(--fs-md);
    }
    .field { margin-bottom: var(--sp-5); }
    label {
      display: block;
      font-family: var(--font-mono);
      font-size: var(--fs-xs);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: var(--sp-2);
    }
    input {
      width: 100%;
      background: rgba(10, 14, 20, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      padding: var(--sp-3);
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .hint {
      font-size: var(--fs-sm);
      color: var(--text-muted);
      margin-top: var(--sp-2);
      line-height: 1.5;
    }
    .soon {
      font-size: var(--fs-xs);
      color: var(--accent);
      background: var(--accent-glow);
      padding: 1px var(--sp-2);
      border-radius: var(--r-sm);
      margin-left: var(--sp-2);
      font-family: var(--font-mono);
    }
    button {
      font-family: var(--font-sans);
      font-size: var(--fs-md);
      font-weight: 500;
      padding: var(--sp-3) var(--sp-5);
      border-radius: var(--r-md);
      border: none;
      background: var(--accent);
      color: #1a1205;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dim); }
    .saved {
      color: var(--ok);
      font-family: var(--font-mono);
      font-size: var(--fs-sm);
      margin-left: var(--sp-3);
      opacity: 0;
      transition: opacity var(--t-base);
    }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1><span class="bracket">[</span>WebAnalyzer<span class="bracket">]</span> Settings</h1>
  <p class="sub">Configuration for the AI analysis integration.</p>

  <div class="field">
    <label for="webhookUrl">n8n Webhook URL <span class="soon">used in Phase 2</span></label>
    <input type="url" id="webhookUrl" placeholder="https://your-n8n.example.com/webhook/xxxxxxxx" />
    <p class="hint">The production webhook URL from your n8n Webhook node. Use HTTPS and a long, random path.</p>
  </div>

  <div class="field">
    <label for="authToken">Header Auth Token <span class="soon">used in Phase 2</span></label>
    <input type="password" id="authToken" placeholder="your secret token" />
    <p class="hint">Sent as a custom header with each request. Configure the matching Header Auth credential in n8n.</p>
  </div>

  <div style="display:flex; align-items:center;">
    <button id="saveBtn">Save settings</button>
    <span class="saved" id="saved">saved ✓</span>
  </div>

  <script src="options.js"></script>
</body>
</html>
